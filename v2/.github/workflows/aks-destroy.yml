name: AKS Destroy
run-name: "AKS Destroy (${{ github.actor }})"

on:
  workflow_dispatch:

env:
  TF_TOKEN_app_terraform_io: ${{ secrets.TFC_TOKEN }}
  TF_CLOUD_ORGANIZATION: ${{ secrets.TFC_ORG }}

jobs:
  # ─────────────────────────────────────────────
  # Job 1 – Remove Kubernetes workloads and Helm release
  # ─────────────────────────────────────────────
  destroy-k8s:
    name: Remove Kubernetes resources
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret:   ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # FIX-06C: read cluster name and resource group from Terraform outputs
      # instead of requiring undocumented AKS_RESOURCE_GROUP / AKS_CLUSTER_NAME secrets
      - name: Terraform Init (to read outputs)
        working-directory: aks-nginx-plus/terraform/aks
        run: terraform init

      - name: Get AKS cluster info from Terraform outputs
        id: tf-output
        working-directory: aks-nginx-plus/terraform/aks
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)"           >> $GITHUB_OUTPUT
          echo "resource_group=$(terraform output -raw resource_group_name)"  >> $GITHUB_OUTPUT

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ steps.tf-output.outputs.resource_group }}" \
            --name           "${{ steps.tf-output.outputs.cluster_name }}" \
            --overwrite-existing

      - name: Setup Helm
        uses: azure/setup-helm@v4

      # FIX-06A: removed "kubectl delete -f nic-values.yaml" (that is a Helm values file,
      # not a Kubernetes manifest — kubectl cannot delete it). WAF CRD files deleted instead.
      - name: Delete app workloads and WAF CRDs
        run: |
          kubectl delete -f aks-nginx-plus/k8s/waf/waf-logconf.yaml --ignore-not-found
          kubectl delete -f aks-nginx-plus/k8s/waf/waf-policy.yaml  --ignore-not-found
        continue-on-error: true

      - name: Uninstall NGINX Ingress Controller (Helm)
        run: |
          helm uninstall nginx-ingress -n nginx-ingress --ignore-not-found || true
          kubectl delete namespace nginx-ingress --ignore-not-found || true

      - name: Wait for Azure LoadBalancer to be released
        run: |
          echo "Waiting for Azure to release the LoadBalancer..."
          sleep 30

  # ─────────────────────────────────────────────
  # Job 2 – Destroy infrastructure with Terraform
  # ─────────────────────────────────────────────
  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs: destroy-k8s
    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: aks-nginx-plus/terraform/aks
        run: terraform init

      - name: Force-unlock workspace (if locked from a previous failed run)
        run: |
          WORKSPACE_ID=$(curl -sf \
            --header "Authorization: Bearer ${{ secrets.TFC_TOKEN }}" \
            --header "Content-Type: application/vnd.api+json" \
            "https://app.terraform.io/api/v2/organizations/${{ secrets.TFC_ORG }}/workspaces/nginx-aks" \
            | jq -r '.data.id')

          if [[ -z "${WORKSPACE_ID}" || "${WORKSPACE_ID}" == "null" ]]; then
            echo "Could not get workspace ID. Continuing without unlock."
            exit 0
          fi

          LOCKED=$(curl -sf \
            --header "Authorization: Bearer ${{ secrets.TFC_TOKEN }}" \
            --header "Content-Type: application/vnd.api+json" \
            "https://app.terraform.io/api/v2/workspaces/${WORKSPACE_ID}" \
            | jq -r '.data.attributes.locked')

          if [[ "${LOCKED}" == "true" ]]; then
            echo "Workspace locked. Force-unlocking..."
            curl -sf \
              --header "Authorization: Bearer ${{ secrets.TFC_TOKEN }}" \
              --header "Content-Type: application/vnd.api+json" \
              --request POST \
              "https://app.terraform.io/api/v2/workspaces/${WORKSPACE_ID}/actions/force-unlock"
            echo "Workspace unlocked."
          else
            echo "Workspace is free. Continuing."
          fi

      # FIX-06B: use terraform destroy instead of az aks delete
      # This removes the cluster, resource group and Log Analytics, then updates the state file.
      - name: Terraform Destroy
        working-directory: aks-nginx-plus/terraform/aks
        run: terraform destroy -auto-approve

      - name: Confirm destruction
        run: |
          echo "──────────────────────────────────────────────"
          echo "✅ All AKS resources have been destroyed:"
          echo "   - NGINX Ingress Controller (Helm: nginx-ingress)"
          echo "   - AKS Cluster"
          echo "   - Resource Group"
          echo "   - Log Analytics Workspace"
          echo "   - Terraform state updated"
          echo "──────────────────────────────────────────────"
